<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  </title>Stardust business tycoon </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      background: #0a0d14;
      color: #e8edf5;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-weight: 400;
    }
    #app {
      max-width: 480px;
      margin: 0 auto;
      height: 100vh;
      background: #111820;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* HUD */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: rgba(10,14,22,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      z-index: 10;
      flex-shrink: 0;
      min-height: 44px;
    }
    .hud-left { display: flex; align-items: center; gap: 8px; }
    .hud-right { display: flex; align-items: center; gap: 6px; }
    .hud-balance {
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.15);
      padding: 2px 12px 2px 8px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #f5d742;
    }
    .hud-balance svg { width: 16px; height: 16px; fill: #f5d742; }
    .hud-rating {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 0.7rem;
      color: #8899bb;
    }
    .hud-rating svg { width: 14px; height: 14px; fill: #f5b342; }

    /* LIVE SCENE */
    .live-scene {
      flex: 1;
      position: relative;
      background: #141c28;
      overflow: hidden;
      min-height: 0;
    }
    .scene-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #1a2533 0%, #0f1720 100%);
    }
    .scene-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      background: linear-gradient(0deg, #2a3645, #1e2938);
      border-top: 1px solid #3a4a5a;
    }
    .scene-floor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
    }

    /* Restaurant interior */
    .counter-bar {
      position: absolute;
      bottom: 28%;
      left: 5%;
      width: 35%;
      height: 22%;
      background: linear-gradient(180deg, #4a3f2e, #2d2418);
      border-radius: 6px 6px 0 0;
      border: 1px solid #5a4f3a;
      border-bottom: none;
      box-shadow: 0 -4px 0 #1a1610;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .counter-bar .register {
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-size: 1.2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .kitchen-area {
      position: absolute;
      bottom: 28%;
      right: 5%;
      width: 25%;
      height: 30%;
      background: linear-gradient(180deg, #3a4a5a, #1a2a3a);
      border-radius: 8px 8px 0 0;
      border: 1px solid #4a5a6a;
      border-bottom: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }
    .kitchen-area .steam {
      position: absolute;
      top: -8px;
      width: 6px;
      height: 16px;
      background: rgba(200,220,255,0.15);
      border-radius: 50%;
      animation: steamRise 1.4s ease-out infinite;
      filter: blur(2px);
    }
    @keyframes steamRise {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      50% { opacity: 0.5; transform: translateY(-14px) scale(1); }
      100% { opacity: 0; transform: translateY(-28px) scale(0.5); }
    }

    /* Tables */
    .table-item {
      position: absolute;
      bottom: 22%;
      width: 14%;
      height: 14%;
      background: linear-gradient(180deg, #5a4d3a, #3d3228);
      border-radius: 4px;
      border: 1px solid #6a5d4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #8a7a62;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .table-item .chair {
      position: absolute;
      bottom: -12px;
      width: 10px;
      height: 12px;
      background: #3d3228;
      border-radius: 2px 2px 0 0;
      border: 1px solid #4a3d2a;
    }
    .table-item .chair.l { left: -6px; }
    .table-item .chair.r { right: -6px; }
    .table-item .customer-seat {
      position: absolute;
      font-size: 1.2rem;
      bottom: 4px;
    }

    /* Customers in scene */
    .scene-customer {
      position: absolute;
      bottom: 24%;
      font-size: 1.8rem;
      transition: left 0.6s cubic-bezier(0.34, 1.2, 0.64, 1), bottom 0.3s;
      z-index: 3;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      width: 36px;
      text-align: center;
    }
    .scene-customer .bubble {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 1px 10px;
      border-radius: 20px;
      font-size: 0.55rem;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.05);
      color: #aabbdd;
    }
    .scene-customer .progress-ring {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 3px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      overflow: hidden;
    }
    .scene-customer .progress-ring .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f5b342, #f7d94a);
      border-radius: 4px;
      transition: width 0.1s;
    }

    /* Employee in scene */
    .scene-employee {
      position: absolute;
      bottom: 26%;
      font-size: 1.6rem;
      z-index: 4;
      transition: left 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      width: 34px;
      text-align: center;
    }
    .scene-employee .action-tag {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 0px 8px;
      border-radius: 12px;
      font-size: 0.5rem;
      white-space: nowrap;
      color: #aabbdd;
      border: 1px solid rgba(255,255,255,0.04);
    }

    /* Floating effects */
    .float-effect {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      font-weight: 700;
      animation: floatUp 1s ease-out forwards;
      text-shadow: 0 0 20px currentColor;
      font-size: 1.2rem;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(0.6); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }
    .coin-burst {
      position: absolute;
      pointer-events: none;
      z-index: 19;
      font-size: 1.2rem;
      animation: burstOut 0.7s ease-out forwards;
    }
    @keyframes burstOut {
      0% { opacity: 1; transform: translate(0,0) scale(0) rotate(0); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(360deg); }
    }

    /* Decision popup */
    .decision-popup {
      position: absolute;
      bottom: 80px;
      left: 10%;
      right: 10%;
      background: rgba(10,14,22,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px 18px;
      z-index: 30;
      animation: slideUp 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .decision-popup h4 { font-size: 0.8rem; color: #b7c4e0; margin-bottom: 4px; }
    .decision-popup p { font-size: 0.9rem; font-weight: 500; margin-bottom: 10px; }
    .decision-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .decision-btns button {
      flex: 1;
      padding: 8px 14px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.1s;
      min-width: 60px;
    }
    .decision-btns button:active { transform: scale(0.95); }
    .btn-primary { background: #4a6cf7; color: white; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #aabbdd; border: 1px solid rgba(255,255,255,0.06); }
    .btn-danger { background: #e74c5e; color: white; }

    /* BOTTOM NAV */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      background: rgba(10,14,22,0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 2px 0 env(safe-area-inset-bottom);
      flex-shrink: 0;
      z-index: 10;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #5a6a82;
      font-size: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
      padding: 4px 6px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 500;
      flex: 1;
      transition: 0.15s;
    }
    .nav-btn svg { width: 20px; height: 20px; fill: currentColor; stroke: currentColor; stroke-width: 1.5; }
    .nav-btn.active { color: #b7a4ff; background: rgba(255,255,255,0.04); }

    /* PANELS */
    .panel {
      position: absolute;
      inset: 0;
      background: rgba(8,12,20,0.94);
      backdrop-filter: blur(12px);
      z-index: 40;
      display: none;
      flex-direction: column;
      padding: 12px 14px 70px;
      overflow-y: auto;
      animation: panelIn 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .panel.open { display: flex; }
    @keyframes panelIn {
      0% { opacity: 0; transform: translateY(8px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      margin-bottom: 12px;
    }
    .panel-header h2 { font-size: 1rem; font-weight: 600; color: #e8edf5; }
    .panel-close {
      background: rgba(255,255,255,0.04);
      border: none;
      color: #8899bb;
      padding: 2px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .panel-card {
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .panel-card .label { font-size: 0.8rem; color: #8899bb; }
    .panel-card .value { font-weight: 600; font-size: 0.9rem; }
    .btn-action {
      background: rgba(255,255,255,0.06);
      border: none;
      color: #e8edf5;
      padding: 4px 16px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.04);
      transition: 0.1s;
    }
    .btn-action:active { transform: scale(0.94); background: rgba(255,255,255,0.1); }
    .btn-action:disabled { opacity: 0.3; }

    /* Stats grid */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin: 6px 0;
    }
    .stat-mini {
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .stat-mini .num { font-size: 1rem; font-weight: 700; }
    .stat-mini .lbl { font-size: 0.55rem; color: #6a7a92; margin-top: 2px; }

    .employee-profile {
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid #4a6cf7;
    }

    /* scrollbar */
    .panel::-webkit-scrollbar { width: 3px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: #2a3345; border-radius: 10px; }

    @media (max-width: 420px) {
      .scene-customer { font-size: 1.4rem; width: 30px; }
      .scene-employee { font-size: 1.3rem; width: 28px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-left">
      <div class="hud-balance">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 10h8"/></svg>
        <span id="hudBalance">0</span>
      </div>
    </div>
    <div class="hud-right">
      <div class="hud-rating">
        <svg viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>
        <span id="hudRating">4.2</span>
      </div>
      <div style="font-size:0.6rem;color:#5a6a82;background:rgba(255,255,255,0.04);padding:2px 10px;border-radius:30px;">
        Lv.<span id="hudLevel">1</span>
      </div>
    </div>
  </div>

  <!-- LIVE SCENE -->
  <div class="live-scene" id="liveScene">
    <div class="scene-bg"></div>
    <div class="scene-floor"></div>
    
    <!-- Counter -->
    <div class="counter-bar">
      <span style="font-size:0.8rem;color:#8a7a62;">🍽️</span>
      <span class="register">💳</span>
    </div>
    
    <!-- Kitchen -->
    <div class="kitchen-area" id="kitchenArea">
      <span>🍳</span>
      <div class="steam" style="left:20%;animation-delay:0.1s;"></div>
      <div class="steam" style="left:50%;animation-delay:0.6s;"></div>
      <div class="steam" style="left:80%;animation-delay:1.1s;"></div>
    </div>
    
    <!-- Tables -->
    <div class="table-item" style="right:8%;"><span>🍷</span><div class="chair l"></div><div class="chair r"></div></div>
    <div class="table-item" style="right:28%;"><span>🥗</span><div class="chair l"></div><div class="chair r"></div></div>
    
    <!-- Employee -->
    <div class="scene-employee" id="sceneEmployee" style="left:20%;">
      <span>👨‍🍳</span>
      <div class="action-tag" id="employeeAction">Idle</div>
    </div>
    
    <!-- Customer container -->
    <div id="customerContainer" style="position:absolute;inset:0;pointer-events:none;"></div>
    <div id="effectContainer" style="position:absolute;inset:0;pointer-events:none;z-index:10;"></div>
    
    <!-- Decision popup -->
    <div class="decision-popup" id="decisionPopup" style="display:none;">
      <h4 id="decisionTitle">📢 Business Decision</h4>
      <p id="decisionDesc">A food festival is coming. Spend ₹5000 on marketing?</p>
      <div class="decision-btns" id="decisionBtns">
        <button class="btn-primary" data-choice="yes">Yes</button>
        <button class="btn-secondary" data-choice="no">No</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" data-panel="dashboard"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</button>
    <button class="nav-btn" data-panel="finance"><svg viewBox="0 0 24 24"><path d="M12 2v20M8 10h8M6 14h12"/></svg>Finance</button>
    <button class="nav-btn" data-panel="staff"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0114 0v2"/></svg>Staff</button>
    <button class="nav-btn" data-panel="decisions"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Decisions</button>
  </div>

  <!-- PANELS -->
  <div class="panel" id="panelDashboard">
    <div class="panel-header"><h2>📊 Dashboard</h2><button class="panel-close" data-panel="dashboard">✕</button></div>
    <div class="stat-grid" id="dashStats"></div>
    <div id="dashNotifications" style="margin-top:8px;"></div>
  </div>
  
  <div class="panel" id="panelFinance">
    <div class="panel-header"><h2>💰 Finance</h2><button class="panel-close" data-panel="finance">✕</button></div>
    <div id="financeContent"></div>
  </div>
  
  <div class="panel" id="panelStaff">
    <div class="panel-header"><h2>👨‍💼 Staff</h2><button class="panel-close" data-panel="staff">✕</button></div>
    <div id="staffContent"></div>
  </div>
  
  <div class="panel" id="panelDecisions">
    <div class="panel-header"><h2>📋 Decisions</h2><button class="panel-close" data-panel="decisions">✕</button></div>
    <div id="decisionsContent"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ============ GAME STATE ============
  const G = {
    balance: 1000,
    level: 1,
    xp: 0,
    reputation: 70,
    rating: 4.2,
    customers: 0,
    employees: [],
    employeeCount: 1,
    branches: 1,
    maxEmployees: 3,
    profit: 0,
    expenses: 0,
    totalRevenue: 0,
    dailyRevenue: 0,
    dailyExpenses: 0,
    stock: 80,
    totalServed: 0,
    decisionCooldown: 0,
    activeEffects: [],
    notifications: [],
    day: 1,
    lastTick: Date.now(),
    saveTimer: 0,
    customerQueue: [],
    servingCustomer: null,
    isCooking: false,
    cookTimer: 0,
    cookMax: 2.0,
    delivered: false,
    spawnTimer: 0,
    spawnInterval: 3.0,
    employeeMood: 75,
    employeeEfficiency: 1.0,
    marketingLevel: 0,
    priceLevel: 1,
    salaryLevel: 1,
    rent: 50,
    tax: 20,
    electricity: 15,
    water: 8,
    maintenance: 10,
  };

  // ============ DOM REFS ============
  const hudBalance = document.getElementById('hudBalance');
  const hudRating = document.getElementById('hudRating');
  const hudLevel = document.getElementById('hudLevel');
  const customerContainer = document.getElementById('customerContainer');
  const effectContainer = document.getElementById('effectContainer');
  const employeeAction = document.getElementById('employeeAction');
  const sceneEmployee = document.getElementById('sceneEmployee');
  const decisionPopup = document.getElementById('decisionPopup');
  const decisionTitle = document.getElementById('decisionTitle');
  const decisionDesc = document.getElementById('decisionDesc');
  const decisionBtns = document.getElementById('decisionBtns');

  // ============ HELPERS ============
  function updateHUD() {
    hudBalance.textContent = Math.floor(G.balance);
    hudRating.textContent = G.rating.toFixed(1);
    hudLevel.textContent = G.level;
  }

  function getIncome() {
    let base = 2.5 * G.branches * (1 + G.level * 0.15) * (1 + G.employeeCount * 0.08);
    base *= (1 + G.marketingLevel * 0.05);
    base *= (G.rating / 4.0);
    return base;
  }

  function getExpenses() {
    let exp = G.rent + G.tax + G.electricity + G.water + G.maintenance;
    exp += G.employeeCount * 15 * (1 + G.salaryLevel * 0.1);
    return exp;
  }

  function spawnFloating(text, x, y, color = '#f5d742') {
    const el = document.createElement('div');
    el.className = 'float-effect';
    el.textContent = text;
    el.style.left = x + '%';
    el.style.top = y + '%';
    el.style.color = color;
    effectContainer.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }

  function coinBurst(cx, cy, count = 5) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'coin-burst';
      el.textContent = ['🪙','💰','✨'][Math.floor(Math.random()*3)];
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
      const dist = 30 + Math.random() * 50;
      el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * dist - 30 + 'px');
      el.style.left = cx + '%';
      el.style.top = cy + '%';
      effectContainer.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }
  }

  function addNotification(text, type = 'info') {
    G.notifications.unshift({ text, type, time: Date.now() });
    if (G.notifications.length > 20) G.notifications.pop();
    renderDashboard();
  }

  // ============ CUSTOMER SYSTEM ============
  function spawnCustomer() {
    if (G.customerQueue.length >= 5) return;
    const types = [
      { emoji: '👨', patience: 6 + Math.random() * 4, tip: 0.5, label: 'Regular' },
      { emoji: '👩', patience: 8 + Math.random() * 5, tip: 0.8, label: 'Patient' },
      { emoji: '👔', patience: 4 + Math.random() * 3, tip: 1.2, label: 'Business' },
      { emoji: '👨‍👩‍👦', patience: 10 + Math.random() * 4, tip: 1.0, label: 'Family' },
    ];
    const type = types[Math.floor(Math.random() * types.length)];
    const customer = {
      id: Date.now() + Math.random() * 1000,
      emoji: type.emoji,
      patience: type.patience,
      maxPatience: type.patience,
      tip: type.tip,
      label: type.label,
      state: 'waiting',
      progress: 0,
      waitTimer: 0,
      x: 70 + Math.random() * 25,
    };
    G.customerQueue.push(customer);
    renderCustomers();
  }

  function renderCustomers() {
    customerContainer.innerHTML = '';
    const queue = G.customerQueue;
    for (let i = 0; i < Math.min(queue.length, 5); i++) {
      const c = queue[i];
      const div = document.createElement('div');
      div.className = 'scene-customer';
      div.style.left = (5 + i * 14) + '%';
      div.style.bottom = (24 + (i % 2) * 4) + '%';
      div.dataset.id = c.id;
      let status = '';
      if (c.state === 'waiting') status = '⏳';
      else if (c.state === 'cooking') status = '🍳';
      else if (c.state === 'served') status = '✅';
      div.innerHTML = `
        <span>${c.emoji}</span>
        <div class="bubble">${c.label}</div>
        <div class="progress-ring"><div class="fill" style="width:${c.progress * 100}%"></div></div>
      `;
      customerContainer.appendChild(div);
    }
  }

  function serveCustomer() {
    if (G.customerQueue.length === 0) return;
    if (G.isCooking) return;
    const c = G.customerQueue[0];
    if (!c) return;
    G.servingCustomer = c;
    c.state = 'cooking';
    c.progress = 0;
    G.isCooking = true;
    G.cookTimer = 0;
    G.cookMax = (1.5 + Math.random() * 0.8) / (1 + G.employeeEfficiency * 0.2);
    employeeAction.textContent = '👨‍🍳 Cooking';
    renderCustomers();
  }

  function completeOrder() {
    const c = G.servingCustomer;
    if (!c) return;
    const earned = Math.floor(4 + G.level * 1.2 + c.tip * 2 + Math.random() * 3);
    G.balance += earned;
    G.totalRevenue += earned;
    G.dailyRevenue += earned;
    G.totalServed += 1;
    G.customers += 1;
    G.xp += 2;
    G.rating = Math.min(5, G.rating + 0.02);

    if (G.xp >= G.level * 15 + 20) {
      G.level++;
      G.xp = 0;
      spawnFloating('🎉 LEVEL UP!', 40, 30, '#b7a4ff');
      addNotification('🎉 Business reached Level ' + G.level + '!', 'success');
    }

    const pos = 5 + G.customerQueue.indexOf(c) * 14;
    coinBurst(pos, 55);
    spawnFloating('+' + earned + '🪙', pos - 2, 45, '#f5d742');

    G.customerQueue.splice(G.customerQueue.indexOf(c), 1);
    G.servingCustomer = null;
    G.isCooking = false;
    G.delivered = false;
    employeeAction.textContent = 'Idle';
    renderCustomers();
    updateHUD();
    renderDashboard();

    // Spawn next
    setTimeout(() => {
      if (G.customerQueue.length < 5 && Math.random() < 0.5) spawnCustomer();
    }, 500);
  }

  // ============ DECISIONS ============
  const DECISIONS = [
    {
      title: '📢 Food Festival',
      desc: 'A local food festival is coming. Spend ₹5000 on marketing?',
      cost: 5000,
      effect: { type: 'marketing', value: 2, duration: 3 },
      yes: 'Invest',
      no: 'Skip'
    },
    {
      title: '👨‍🍳 Employee Strike',
      desc: 'Staff demand a salary increase. Raise salaries by 15%?',
      cost: 0,
      effect: { type: 'salary', value: 1.15, duration: 0 },
      yes: 'Increase',
      no: 'Refuse'
    },
    {
      title: '🏗️ Renovation',
      desc: 'Renovate the restaurant for ₹8000. +20% customer satisfaction.',
      cost: 8000,
      effect: { type: 'rating', value: 0.3, duration: 5 },
      yes: 'Renovate',
      no: 'Skip'
    },
    {
      title: '📱 Social Media Ads',
      desc: 'Run a social media campaign for ₹3000. +15% customers for 4 days.',
      cost: 3000,
      effect: { type: 'marketing', value: 1.5, duration: 4 },
      yes: 'Advertise',
      no: 'Skip'
    },
  ];

  let currentDecision = null;
  let decisionTimer = 0;
  const DECISION_INTERVAL = 25; // seconds

  function triggerDecision() {
    if (currentDecision) return;
    if (G.decisionCooldown > 0) return;
    const available = DECISIONS.filter(d => G.balance >= d.cost * 0.5);
    if (available.length === 0) return;
    currentDecision = available[Math.floor(Math.random() * available.length)];
    decisionTitle.textContent = currentDecision.title;
    decisionDesc.textContent = currentDecision.desc;
    decisionBtns.innerHTML = `
      <button class="btn-primary" data-choice="yes">${currentDecision.yes}</button>
      <button class="btn-secondary" data-choice="no">${currentDecision.no}</button>
    `;
    decisionPopup.style.display = 'block';
    
    decisionBtns.querySelectorAll('button').forEach(btn => {
      btn.onclick = function() {
        const choice = this.dataset.choice;
        handleDecision(choice);
      };
    });
  }

  function handleDecision(choice) {
    if (!currentDecision) return;
    const d = currentDecision;
    if (choice === 'yes') {
      if (G.balance >= d.cost) {
        G.balance -= d.cost;
        if (d.effect.type === 'marketing') {
          G.marketingLevel += d.effect.value;
          addNotification('📈 Marketing boosted! +' + (d.effect.value*100) + '% customers', 'success');
        } else if (d.effect.type === 'salary') {
          G.salaryLevel *= d.effect.value;
          addNotification('💰 Salaries increased. Employee mood improved.', 'info');
        } else if (d.effect.type === 'rating') {
          G.rating = Math.min(5, G.rating + d.effect.value);
          addNotification('⭐ Rating increased to ' + G.rating.toFixed(1), 'success');
        }
        spawnFloating('✅ Decision made', 40, 30, '#7bed9f');
      } else {
        addNotification('❌ Not enough funds!', 'error');
      }
    } else {
      addNotification('📋 Decision declined', 'info');
    }
    currentDecision = null;
    decisionPopup.style.display = 'none';
    G.decisionCooldown = 8;
    updateHUD();
    renderDashboard();
    renderFinance();
  }

  // ============ GAME LOOP ============
  let lastLoop = 0;
  function gameLoop(time) {
    const delta = Math.min(0.05, (time - lastLoop) / 1000);
    lastLoop = time;

    // Income
    const income = getIncome();
    const expenses = getExpenses();
    G.balance += (income - expenses) * delta * 0.3;
    G.profit += (income - expenses) * delta * 0.3;
    G.dailyRevenue += income * delta * 0.3;
    G.dailyExpenses += expenses * delta * 0.3;

    // Customer spawn
    G.spawnTimer += delta;
    if (G.spawnTimer >= G.spawnInterval / (1 + G.marketingLevel * 0.05)) {
      G.spawnTimer = 0;
      if (G.customerQueue.length < 5 && Math.random() < 0.5) spawnCustomer();
    }

    // Cooking
    if (G.isCooking && G.servingCustomer) {
      G.cookTimer += delta * (1 + G.employeeEfficiency * 0.15);
      const progress = Math.min(1, G.cookTimer / G.cookMax);
      G.servingCustomer.progress = progress;
      if (progress >= 1) {
        G.delivered = true;
        completeOrder();
      }
      renderCustomers();
    }

    // Auto-serve (if employees available)
    if (G.employeeCount > 0 && !G.isCooking && G.customerQueue.length > 0) {
      serveCustomer();
    }

    // Customer patience
    for (let c of G.customerQueue) {
      if (c.state === 'waiting') {
        c.waitTimer += delta;
        if (c.waitTimer > c.maxPatience) {
          const idx = G.customerQueue.indexOf(c);
          if (idx > -1) {
            G.rating = Math.max(1, G.rating - 0.05);
            G.customerQueue.splice(idx, 1);
            spawnFloating('😤 Left', 5 + idx * 14, 50, '#ff6b6b');
            renderCustomers();
            updateHUD();
          }
        }
      }
    }

    // Decision timer
    G.decisionCooldown = Math.max(0, G.decisionCooldown - delta);
    decisionTimer += delta;
    if (decisionTimer >= DECISION_INTERVAL && !currentDecision) {
      decisionTimer = 0;
      triggerDecision();
    }

    // Update HUD
    updateHUD();
    renderCustomers();

    // Auto save
    G.saveTimer += delta;
    if (G.saveTimer >= 5) {
      G.saveTimer = 0;
      saveGame();
    }

    requestAnimationFrame(gameLoop);
  }

  // ============ RENDER FUNCTIONS ============
  function renderDashboard() {
    const container = document.getElementById('dashStats');
    const profit = getIncome() - getExpenses();
    container.innerHTML = `
      <div class="stat-mini"><div class="num">₹${Math.floor(G.balance)}</div><div class="lbl">Balance</div></div>
      <div class="stat-mini"><div class="num" style="color:${profit>=0?'#7bed9f':'#ff6b6b'}">${profit>=0?'+':''}${profit.toFixed(1)}</div><div class="lbl">Profit/s</div></div>
      <div class="stat-mini"><div class="num">${G.customers}</div><div class="lbl">Customers</div></div>
      <div class="stat-mini"><div class="num">${G.employeeCount}</div><div class="lbl">Staff</div></div>
      <div class="stat-mini"><div class="num">${G.branches}</div><div class="lbl">Branches</div></div>
      <div class="stat-mini"><div class="num">${G.rating.toFixed(1)}⭐</div><div class="lbl">Rating</div></div>
    `;
    
    const notifContainer = document.getElementById('dashNotifications');
    let html = '<div style="font-size:0.7rem;color:#6a7a92;margin-bottom:4px;">🔔 Live Updates</div>';
    for (let n of G.notifications.slice(0, 5)) {
      const color = n.type === 'success' ? '#7bed9f' : n.type === 'error' ? '#ff6b6b' : '#b7c4e0';
      html += `<div style="font-size:0.7rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);color:${color};">${n.text}</div>`;
    }
    notifContainer.innerHTML = html;
  }

  function renderFinance() {
    const container = document.getElementById('financeContent');
    const income = getIncome();
    const expenses = getExpenses();
    container.innerHTML = `
      <div class="panel-card"><span class="label">💰 Revenue (daily)</span><span class="value">₹${G.dailyRevenue.toFixed(0)}</span></div>
      <div class="panel-card"><span class="label">📉 Expenses (daily)</span><span class="value">₹${G.dailyExpenses.toFixed(0)}</span></div>
      <div class="panel-card"><span class="label">📊 Profit</span><span class="value" style="color:${(income-expenses)>=0?'#7bed9f':'#ff6b6b'}">${(income-expenses).toFixed(1)}/s</span></div>
      <div class="panel-card"><span class="label">🏢 Rent</span><span class="value">₹${G.rent}</span></div>
      <div class="panel-card"><span class="label">💡 Electricity</span><span class="value">₹${G.electricity}</span></div>
      <div class="panel-card"><span class="label">💧 Water</span><span class="value">₹${G.water}</span></div>
      <div class="panel-card"><span class="label">🧰 Maintenance</span><span class="value">₹${G.maintenance}</span></div>
      <div class="panel-card"><span class="label">💰 Total Revenue</span><span class="value">₹${Math.floor(G.totalRevenue)}</span></div>
    `;
  }

  function renderStaff() {
    const container = document.getElementById('staffContent');
    let html = `<div class="panel-card"><span class="label">👨‍💼 Employees</span><span class="value">${G.employeeCount}</span></div>`;
    html += `<div class="panel-card"><span class="label">😊 Employee Mood</span><span class="value">${Math.floor(G.employeeMood)}%</span></div>`;
    html += `<div class="panel-card"><span class="label">⚡ Efficiency</span><span class="value">${(G.employeeEfficiency * 100).toFixed(0)}%</span></div>`;
    html += `<div class="panel-card"><span class="label">💰 Salary Level</span><span class="value">${G.salaryLevel.toFixed(1)}x</span></div>`;
    html += `<button class="btn-action" id="hireStaffBtn" style="width:100%;margin-top:8px;padding:10px;">+ Hire Employee (₹${50 + G.employeeCount * 30})</button>`;
    html += `<button class="btn-action" id="trainStaffBtn" style="width:100%;margin-top:6px;padding:10px;background:rgba(74,108,247,0.2);">📚 Train Staff (₹100)</button>`;
    container.innerHTML = html;
    
    document.getElementById('hireStaffBtn')?.addEventListener('click', () => {
      const cost = 50 + G.employeeCount * 30;
      if (G.balance >= cost) {
        G.balance -= cost;
        G.employeeCount++;
        G.employeeEfficiency = Math.min(1.5, G.employeeEfficiency + 0.05);
        addNotification('👨‍💼 New employee hired!', 'success');
        updateHUD();
        renderStaff();
        renderDashboard();
      } else {
        addNotification('❌ Not enough funds!', 'error');
      }
    });
    
    document.getElementById('trainStaffBtn')?.addEventListener('click', () => {
      if (G.balance >= 100) {
        G.balance -= 100;
        G.employeeEfficiency = Math.min(1.8, G.employeeEfficiency + 0.1);
        G.employeeMood = Math.min(100, G.employeeMood + 5);
        addNotification('📚 Staff training complete!', 'success');
        updateHUD();
        renderStaff();
      } else {
        addNotification('❌ Not enough funds!', 'error');
      }
    });
  }

  function renderDecisions() {
    const container = document.getElementById('decisionsContent');
    let html = '<div style="font-size:0.8rem;color:#8899bb;margin-bottom:8px;">Past decisions and their effects:</div>';
    for (let d of G.notifications.filter(n => n.type === 'success' || n.type === 'info').slice(0, 8)) {
      html += `<div style="font-size:0.7rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);color:#b7c4e0;">${d.text}</div>`;
    }
    container.innerHTML = html;
  }

  // ============ SAVE / LOAD ============
  function saveGame() {
    try {
      const data = { ...G, lastSave: Date.now() };
      localStorage.setItem('stardustCEO', JSON.stringify(data));
    } catch(e){}
  }

  function loadGame() {
    try {
      const raw = localStorage.getItem('stardustCEO');
      if (!raw) return false;
      const data = JSON.parse(raw);
      Object.assign(G, data);
      if (!G.notifications) G.notifications = [];
      return true;
    } catch(e){ return false; }
  }

  // ============ PANELS ============
  function initPanels() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const panel = this.dataset.panel;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
        if (panel !== 'dashboard') {
          const target = document.getElementById('panel' + panel.charAt(0).toUpperCase() + panel.slice(1));
          if (target) {
            target.classList.add('open');
            if (panel === 'finance') renderFinance();
            if (panel === 'staff') renderStaff();
            if (panel === 'decisions') renderDecisions();
          }
        } else {
          renderDashboard();
        }
      });
    });
    document.querySelectorAll('.panel-close').forEach(btn => {
      btn.addEventListener('click', function() {
        this.closest('.panel').classList.remove('open');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-panel="dashboard"]')?.classList.add('active');
      });
    });
  }

  // ============ INIT ============
  function init() {
    loadGame();
    updateHUD();
    initPanels();
    renderDashboard();
    renderFinance();
    renderStaff();
    renderDecisions();
    
    // Initial customers
    setTimeout(() => { if (G.customerQueue.length === 0) spawnCustomer(); }, 500);
    setTimeout(() => { if (G.customerQueue.length < 2) spawnCustomer(); }, 1200);
    
    // Auto save
    setInterval(saveGame, 3000);
    
    // Visibility change
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) saveGame();
      else { loadGame(); updateHUD(); renderDashboard(); }
    });
    
    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
</body>
</html>
