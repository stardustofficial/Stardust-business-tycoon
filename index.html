<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stardust Tycoon - Tea Stall</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      background: #0b0e14;
      color: #f0f3fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: pan-y;
    }
    #game {
      max-width: 480px;
      width: 100%;
      height: 100vh;
      max-height: 860px;
      background: #141a24;
      border-radius: 0px;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* TOP HUD */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: #0f141e;
      border-bottom: 1px solid #293141;
      z-index: 10;
      flex-shrink: 0;
      min-height: 48px;
    }
    .hud-currency {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .coin-badge {
      background: #1e2636;
      padding: 2px 14px 2px 10px;
      border-radius: 30px;
      border: 1px solid #3f4a62;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .coin-icon { display: inline-block; width: 20px; height: 20px; background: radial-gradient(circle at 30% 30%, #f9d976, #d49a1a); border-radius: 50%; box-shadow: 0 0 8px #f7b32b; }
    .gem-icon { display: inline-block; width: 18px; height: 18px; background: radial-gradient(circle at 30% 30%, #8ef, #1a7aff); border-radius: 4px; transform: rotate(15deg); }
    .hud-level {
      background: #252f42;
      padding: 2px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #4a5670;
    }

    /* SHOP AREA */
    .shop-scene {
      flex: 1;
      position: relative;
      background: #1c2330;
      overflow: hidden;
      min-height: 300px;
      border-bottom: 2px solid #2e384b;
    }
    .shop-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(0deg, #2f3a4a 0%, #232b3a 100%);
      border-top: 3px solid #3f4b60;
    }
    .counter-area {
      position: absolute;
      bottom: 30%;
      left: 10%;
      width: 50%;
      height: 35%;
      background: #4a3f33;
      border-radius: 20px 20px 0 0;
      border: 2px solid #6b5d4b;
      box-shadow: inset 0 -10px 0 #3d3228;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #d4b68a;
    }
    .counter-area::after {
      content: '🍵 TEA';
      font-size: 1rem;
      background: #2f281e;
      padding: 2px 12px;
      border-radius: 30px;
      position: absolute;
      bottom: -18px;
      color: #d4b68a;
      border: 1px solid #6b5d4b;
    }

    /* customers */
    .customer {
      position: absolute;
      bottom: 32%;
      font-size: 2.4rem;
      transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 5;
      cursor: pointer;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
      width: 50px;
      text-align: center;
      line-height: 1.2;
    }
    .customer .bubble {
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f293b;
      padding: 2px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      white-space: nowrap;
      border: 1px solid #4a5a7a;
      color: #cbd5f0;
      opacity: 0;
      transition: 0.2s;
    }
    .customer.waiting .bubble { opacity: 1; }
    .customer.served .bubble { opacity: 0; }
    .customer .progress-ring {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 6px;
      background: #2a3345;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #3f4a62;
    }
    .customer .progress-ring .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f5b342, #f7d94a);
      border-radius: 10px;
      transition: width 0.1s;
    }
    .customer .status-emoji {
      position: absolute;
      top: -40px;
      right: -20px;
      font-size: 1.4rem;
      animation: pop 0.4s;
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.4); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* queue indicator */
    .queue-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #1f283b;
      padding: 4px 14px;
      border-radius: 30px;
      border: 1px solid #43506a;
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 8;
    }

    /* FLOATING COINS */
    .float-coin {
      position: absolute;
      font-size: 1.8rem;
      pointer-events: none;
      z-index: 20;
      animation: floatCoin 1s ease-out forwards;
      font-weight: 700;
      color: #f5d742;
      text-shadow: 0 0 20px #f7b32b;
    }
    @keyframes floatCoin {
      0% { opacity: 1; transform: translateY(0) scale(0.6); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.6); }
    }

    /* BOTTOM TOOLBAR */
    .toolbar {
      display: flex;
      justify-content: space-around;
      background: #0f141e;
      border-top: 1px solid #28303f;
      padding: 6px 0 env(safe-area-inset-bottom);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 2px;
    }
    .tool-btn {
      background: transparent;
      border: none;
      color: #7c88a3;
      font-size: 0.55rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
      padding: 4px 8px;
      border-radius: 20px;
      transition: 0.1s;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
      min-width: 44px;
    }
    .tool-btn svg { width: 24px; height: 24px; fill: currentColor; stroke: currentColor; stroke-width: 1.5; }
    .tool-btn.active { color: #b7a4ff; background: #222b3d; }
    .tool-btn:active { transform: scale(0.92); }

    /* PANELS */
    .panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 12, 20, 0.92);
      backdrop-filter: blur(8px);
      z-index: 30;
      display: none;
      flex-direction: column;
      padding: 20px 16px;
      overflow-y: auto;
      animation: fadeIn 0.2s;
    }
    .panel.open { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a3345;
      margin-bottom: 16px;
    }
    .panel-close {
      background: #2a3345;
      border: none;
      color: white;
      padding: 4px 16px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
    }
    .panel-item {
      background: #1b2332;
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 1px solid #2f3a50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .panel-item .label { font-weight: 600; }
    .panel-item .sub { font-size: 0.75rem; color: #8a99b8; }
    .btn-action {
      background: #3d4b68;
      border: none;
      color: white;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid #5b6b8f;
      transition: 0.1s;
    }
    .btn-action:active { transform: scale(0.93); background: #2f3b57; }
    .btn-action:disabled { opacity: 0.4; }

    /* upgrade card */
    .upgrade-card {
      background: #19212e;
      border-radius: 16px;
      padding: 12px;
      margin: 6px 0;
      border-left: 4px solid #7b8bb8;
    }

    /* responsive */
    @media (max-width: 420px) {
      .customer { font-size: 2rem; width: 40px; }
      .counter-area { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div id="game">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-currency">
      <span class="coin-badge"><span class="coin-icon"></span> <span id="coinDisplay">0</span></span>
      <span class="coin-badge" style="border-color:#3f6a9a;"><span class="gem-icon"></span> <span id="gemDisplay">0</span></span>
    </div>
    <div class="hud-level">⭐ Lv.<span id="playerLevel">1</span></div>
  </div>

  <!-- SHOP SCENE -->
  <div class="shop-scene" id="shopScene">
    <div class="shop-floor"></div>
    <div class="counter-area" id="counterDisplay">🍵 Tea Stall</div>
    <div class="queue-badge" id="queueBadge">👥 0</div>
    <!-- customers rendered here -->
    <div id="customerContainer" style="position:relative;width:100%;height:100%;"></div>
  </div>

  <!-- BOTTOM TOOLBAR -->
  <div class="toolbar">
    <button class="tool-btn active" data-panel="home"><svg viewBox="0 0 24 24"><path d="M12 3L3 9l9 6 9-6-9-6z"/><path d="M3 15l9 6 9-6"/></svg>Shop</button>
    <button class="tool-btn" data-panel="upgrade"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Upgrade</button>
    <button class="tool-btn" data-panel="employees"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0114 0v2"/></svg>Staff</button>
    <button class="tool-btn" data-panel="missions"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Goals</button>
  </div>

  <!-- PANELS -->
  <div class="panel" id="panelUpgrade">
    <div class="panel-header"><span style="font-size:1.2rem;font-weight:700;">⬆ Upgrades</span><button class="panel-close" data-panel="upgrade">✕</button></div>
    <div id="upgradeList"></div>
  </div>
  <div class="panel" id="panelEmployees">
    <div class="panel-header"><span style="font-size:1.2rem;font-weight:700;">👨‍💼 Staff</span><button class="panel-close" data-panel="employees">✕</button></div>
    <div id="employeeList"></div>
  </div>
  <div class="panel" id="panelMissions">
    <div class="panel-header"><span style="font-size:1.2rem;font-weight:700;">🎯 Missions</span><button class="panel-close" data-panel="missions">✕</button></div>
    <div id="missionList"></div>
  </div>
  <div class="panel" id="panelHome" style="display:none;"></div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- GAME STATE ----------
    const G = {
      coins: 100,
      gems: 0,
      level: 1,
      xp: 0,
      reputation: 50,
      totalCustomers: 0,
      totalEarned: 0,
      businesses: [{ name: 'Tea Stall', level: 1, employees: [], manager: false, income: 1.2, upgradeCost: 30 }],
      customers: [],
      queue: [],
      serving: null, // customer being served
      cookTimer: 0,
      cookMax: 2.0, // seconds
      isCooking: false,
      delivered: false,
      employeeCount: 0,
      managerActive: false,
      autoServeInterval: null,
      customerSpawnTimer: 0,
      customerSpawnInterval: 3.0,
      maxQueue: 5,
      missions: [
        { id: 'm1', name: 'Serve 5 customers', progress: 0, target: 5, reward: 50, done: false },
        { id: 'm2', name: 'Earn 200 coins', progress: 0, target: 200, reward: 80, done: false },
        { id: 'm3', name: 'Hire 2 employees', progress: 0, target: 2, reward: 100, done: false },
        { id: 'm4', name: 'Reach level 3', progress: 0, target: 3, reward: 150, done: false },
      ],
      achievements: [],
      lastSave: Date.now(),
    };

    // DOM refs
    const coinDisplay = document.getElementById('coinDisplay');
    const gemDisplay = document.getElementById('gemDisplay');
    const levelDisplay = document.getElementById('playerLevel');
    const queueBadge = document.getElementById('queueBadge');
    const customerContainer = document.getElementById('customerContainer');
    const counterDisplay = document.getElementById('counterDisplay');

    // ----- helpers -----
    function updateHUD() {
      coinDisplay.textContent = Math.floor(G.coins);
      gemDisplay.textContent = G.gems;
      levelDisplay.textContent = G.level;
      queueBadge.textContent = '👥 ' + G.queue.length;
    }

    function getIncome() {
      let base = G.businesses[0].income * G.businesses[0].level * (1 + G.employeeCount * 0.15);
      if (G.managerActive) base *= 1.8;
      return base;
    }

    // ----- customer system -----
    function spawnCustomer() {
      if (G.queue.length >= G.maxQueue) return;
      const customer = {
        id: Date.now() + Math.random() * 1000,
        state: 'waiting', // waiting, cooking, served, leaving
        waitTime: 0,
        maxWait: 12 + Math.random() * 6,
        position: 0,
        tip: 0,
        emoji: ['👨','👩','👴','👵','🧑','👱','👨‍🦰','👩‍🦱'][Math.floor(Math.random()*8)],
        order: 'Tea',
        progress: 0,
      };
      G.queue.push(customer);
      G.customers.push(customer);
      renderCustomers();
      updateHUD();
      // mission progress
      const m = G.missions.find(m => m.id === 'm1');
      if (m && !m.done) m.progress = Math.min(m.target, m.progress + 0.5);
      checkMissions();
    }

    function renderCustomers() {
      const container = customerContainer;
      container.innerHTML = '';
      const queue = G.queue;
      const maxShow = Math.min(queue.length, 6);
      for (let i = 0; i < maxShow; i++) {
        const c = queue[i];
        const div = document.createElement('div');
        div.className = 'customer ' + c.state;
        div.dataset.id = c.id;
        div.style.left = (10 + i * 12) + '%';
        div.style.bottom = (32 + (i % 2) * 4) + '%';
        div.innerHTML = `
          <span>${c.emoji}</span>
          <div class="bubble">${c.order}</div>
          <div class="progress-ring"><div class="fill" style="width:${c.progress*100}%"></div></div>
          ${c.state === 'waiting' ? '<div class="status-emoji">⏳</div>' : ''}
          ${c.state === 'cooking' ? '<div class="status-emoji">🍳</div>' : ''}
          ${c.state === 'served' ? '<div class="status-emoji">✅</div>' : ''}
        `;
        // tap to serve
        if (c.state === 'waiting' || c.state === 'cooking') {
          div.addEventListener('click', (e) => {
            e.stopPropagation();
            handleCustomerTap(c.id);
          });
        }
        container.appendChild(div);
      }
      // update progress bars
      document.querySelectorAll('.customer .fill').forEach((el, idx) => {
        if (idx < queue.length) {
          const pct = Math.min(1, queue[idx].progress || 0);
          el.style.width = (pct * 100) + '%';
        }
      });
    }

    function handleCustomerTap(id) {
      const c = G.queue.find(q => q.id === id);
      if (!c) return;
      if (c.state === 'waiting' && !G.serving) {
        // start cooking
        G.serving = c;
        c.state = 'cooking';
        c.progress = 0;
        G.isCooking = true;
        G.cookTimer = 0;
        G.cookMax = 1.8 + Math.random() * 0.8;
        counterDisplay.textContent = '🍳 Cooking...';
        renderCustomers();
        updateHUD();
        return;
      }
      if (c.state === 'cooking' && G.serving && G.serving.id === c.id && G.delivered) {
        // deliver!
        completeOrder(c);
        return;
      }
    }

    function completeOrder(c) {
      const earned = Math.floor(3 + G.businesses[0].level * 1.5 + Math.random() * 4);
      G.coins += earned;
      G.totalEarned += earned;
      G.totalCustomers += 1;
      G.reputation = Math.min(100, G.reputation + 0.5);
      // floating coins
      spawnFloatingCoin('+' + earned + '🪙', '#f5d742');
      // remove from queue
      const idx = G.queue.indexOf(c);
      if (idx > -1) G.queue.splice(idx, 1);
      G.serving = null;
      G.isCooking = false;
      G.delivered = false;
      counterDisplay.textContent = '🍵 Tea Stall';
      renderCustomers();
      updateHUD();
      checkMissions();
      // spawn new
      setTimeout(() => { if (G.queue.length < G.maxQueue) spawnCustomer(); }, 800);
    }

    // cooking loop
    function updateCooking(delta) {
      if (!G.isCooking || !G.serving) return;
      G.cookTimer += delta;
      const progress = Math.min(1, G.cookTimer / G.cookMax);
      G.serving.progress = progress;
      if (progress >= 1) {
        G.delivered = true;
        G.serving.state = 'served';
        counterDisplay.textContent = '✅ Tap to Deliver!';
        renderCustomers();
        updateHUD();
      } else {
        renderCustomers();
      }
    }

    // auto serve (manager)
    function autoServe() {
      if (!G.managerActive) return;
      if (G.queue.length === 0) return;
      const c = G.queue[0];
      if (!c) return;
      if (c.state === 'waiting' && !G.serving) {
        // start cooking automatically
        G.serving = c;
        c.state = 'cooking';
        c.progress = 0;
        G.isCooking = true;
        G.cookTimer = 0;
        G.cookMax = 1.2 + Math.random() * 0.6;
        counterDisplay.textContent = '🤖 Auto-Cooking...';
        renderCustomers();
        updateHUD();
      } else if (c.state === 'cooking' && G.serving && G.serving.id === c.id && G.delivered) {
        completeOrder(c);
      }
    }

    // spawn floating coin
    function spawnFloatingCoin(text, color = '#f5d742') {
      const el = document.createElement('div');
      el.className = 'float-coin';
      el.textContent = text;
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top = (30 + Math.random() * 30) + '%';
      el.style.color = color;
      document.getElementById('shopScene').appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    // ----- missions -----
    function checkMissions() {
      for (let m of G.missions) {
        if (m.done) continue;
        if (m.id === 'm1' && m.progress >= m.target) { m.done = true; G.coins += m.reward; spawnFloatingCoin('✅ Mission complete! +' + m.reward, '#7bed9f'); }
        if (m.id === 'm2' && G.totalEarned >= m.target) { m.done = true; G.coins += m.reward; spawnFloatingCoin('✅ Mission complete! +' + m.reward, '#7bed9f'); }
        if (m.id === 'm3' && G.employeeCount >= m.target) { m.done = true; G.coins += m.reward; spawnFloatingCoin('✅ Mission complete! +' + m.reward, '#7bed9f'); }
        if (m.id === 'm4' && G.level >= m.target) { m.done = true; G.coins += m.reward; spawnFloatingCoin('✅ Mission complete! +' + m.reward, '#7bed9f'); }
      }
      updateHUD();
    }

    // ----- upgrades -----
    function upgradeBusiness() {
      const biz = G.businesses[0];
      const cost = Math.floor(30 + biz.level * 15);
      if (G.coins < cost) return;
      G.coins -= cost;
      biz.level += 1;
      G.xp += 8;
      if (G.xp >= G.level * 20 + 30) { G.level++; G.xp = 0; }
      spawnFloatingCoin('⬆ Level ' + biz.level, '#7b9cf5');
      updateHUD();
      renderUpgradePanel();
    }

    function hireEmployee() {
      const cost = 50 + G.employeeCount * 30;
      if (G.coins < cost) return;
      G.coins -= cost;
      G.employeeCount += 1;
      G.businesses[0].employees.push({ level: 1 });
      spawnFloatingCoin('👤 Hired!', '#7bed9f');
      updateHUD();
      renderEmployeePanel();
      checkMissions();
    }

    function hireManager() {
      if (G.managerActive) return;
      if (G.coins < 300) return;
      G.coins -= 300;
      G.managerActive = true;
      spawnFloatingCoin('🧠 Manager active!', '#b388ff');
      updateHUD();
      renderEmployeePanel();
    }

    // ----- render panels -----
    function renderUpgradePanel() {
      const container = document.getElementById('upgradeList');
      const biz = G.businesses[0];
      const cost = Math.floor(30 + biz.level * 15);
      container.innerHTML = `
        <div class="panel-item">
          <div><span class="label">🍵 Tea Stall</span><br><span class="sub">Level ${biz.level} · Income ${(biz.income * biz.level * (1 + G.employeeCount*0.15)).toFixed(1)}/s</span></div>
          <button class="btn-action" id="upgradeBizBtn">⬆ Upgrade (${cost})</button>
        </div>
        <div class="upgrade-card">
          <div style="display:flex;justify-content:space-between;"><span>⭐ Reputation</span><span>${G.reputation.toFixed(0)}%</span></div>
          <div style="background:#1e2636;height:6px;border-radius:10px;margin:4px 0;"><div style="height:100%;width:${G.reputation}%;background:linear-gradient(90deg,#f5b342,#f7d94a);border-radius:10px;"></div></div>
        </div>
        <div class="upgrade-card">
          <span class="label">📈 Total Earned: ${Math.floor(G.totalEarned)}</span>
        </div>
      `;
      document.getElementById('upgradeBizBtn')?.addEventListener('click', upgradeBusiness);
    }

    function renderEmployeePanel() {
      const container = document.getElementById('employeeList');
      const biz = G.businesses[0];
      container.innerHTML = `
        <div class="panel-item">
          <div><span class="label">👨‍💼 Employees</span><br><span class="sub">${G.employeeCount} hired</span></div>
          <button class="btn-action" id="hireEmpBtn">Hire (${50 + G.employeeCount * 30})</button>
        </div>
        <div class="panel-item">
          <div><span class="label">🧠 Manager</span><br><span class="sub">${G.managerActive ? '✅ Active' : 'Automates serving'}</span></div>
          <button class="btn-action" id="hireManagerBtn" ${G.managerActive ? 'disabled' : ''}>${G.managerActive ? 'Active' : 'Hire (300)'}</button>
        </div>
        <div style="padding:8px;background:#1a212e;border-radius:16px;margin-top:8px;">
          <div style="font-size:0.8rem;color:#9aabcc;">👥 Employees increase income by 15% each.</div>
        </div>
      `;
      document.getElementById('hireEmpBtn')?.addEventListener('click', hireEmployee);
      document.getElementById('hireManagerBtn')?.addEventListener('click', hireManager);
    }

    function renderMissionPanel() {
      const container = document.getElementById('missionList');
      let html = '';
      for (let m of G.missions) {
        const done = m.done ? '✅' : '⏳';
        const prog = m.progress + '/' + m.target;
        html += `<div class="panel-item" style="${m.done ? 'border-left-color:#7bed9f;' : ''}">
          <div><span class="label">${done} ${m.name}</span><br><span class="sub">${prog}</span></div>
          <span style="color:#f5d742;">+${m.reward}🪙</span>
        </div>`;
      }
      container.innerHTML = html;
    }

    // ----- game loop -----
    let lastTime = 0;
    function gameLoop(time) {
      const delta = Math.min(0.05, (time - lastTime) / 1000);
      lastTime = time;

      // spawn customers
      G.customerSpawnTimer += delta;
      if (G.customerSpawnTimer >= G.customerSpawnInterval) {
        G.customerSpawnTimer = 0;
        if (G.queue.length < G.maxQueue && Math.random() < 0.7) spawnCustomer();
      }

      // cooking
      updateCooking(delta);

      // auto serve (manager)
      if (G.managerActive) {
        autoServe();
      }

      // customer wait time & anger
      for (let c of G.queue) {
        if (c.state === 'waiting') {
          c.waitTime += delta;
          if (c.waitTime > c.maxWait) {
            // angry leave
            spawnFloatingCoin('😡 Left!', '#ff6b6b');
            G.reputation = Math.max(0, G.reputation - 2);
            const idx = G.queue.indexOf(c);
            if (idx > -1) G.queue.splice(idx, 1);
            if (G.serving === c) { G.serving = null; G.isCooking = false; G.delivered = false; counterDisplay.textContent = '🍵 Tea Stall'; }
            renderCustomers();
            updateHUD();
          }
        }
      }

      // passive income
      G.coins += getIncome() * delta * 0.4;
      G.totalEarned += getIncome() * delta * 0.4;
      updateHUD();

      // save
      if (Math.random() < 0.01) saveGame();

      renderCustomers();
      requestAnimationFrame(gameLoop);
    }

    // ----- save/load -----
    function saveGame() {
      try {
        const data = { ...G, lastSave: Date.now() };
        localStorage.setItem('stardustTycoonV2', JSON.stringify(data));
      } catch(e){}
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem('stardustTycoonV2');
        if (!raw) return false;
        const data = JSON.parse(raw);
        Object.assign(G, data);
        // ensure missions
        if (!G.missions || G.missions.length === 0) {
          G.missions = [
            { id: 'm1', name: 'Serve 5 customers', progress: 0, target: 5, reward: 50, done: false },
            { id: 'm2', name: 'Earn 200 coins', progress: 0, target: 200, reward: 80, done: false },
            { id: 'm3', name: 'Hire 2 employees', progress: 0, target: 2, reward: 100, done: false },
            { id: 'm4', name: 'Reach level 3', progress: 0, target: 3, reward: 150, done: false },
          ];
        }
        if (!G.businesses || G.businesses.length === 0) {
          G.businesses = [{ name: 'Tea Stall', level: 1, employees: [], manager: false, income: 1.2, upgradeCost: 30 }];
        }
        G.employeeCount = G.businesses[0].employees.length;
        G.managerActive = G.businesses[0].manager || false;
        return true;
      } catch(e){ return false; }
    }

    // ----- init UI panels -----
    function initPanels() {
      document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const panel = this.dataset.panel;
          document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
          if (panel !== 'home') {
            const target = document.getElementById('panel' + panel.charAt(0).toUpperCase() + panel.slice(1));
            if (target) {
              target.classList.add('open');
              if (panel === 'upgrade') renderUpgradePanel();
              if (panel === 'employees') renderEmployeePanel();
              if (panel === 'missions') renderMissionPanel();
            }
          }
        });
      });
      document.querySelectorAll('.panel-close').forEach(btn => {
        btn.addEventListener('click', function() {
          this.closest('.panel').classList.remove('open');
          document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
          document.querySelector('[data-panel="home"]')?.classList.add('active');
        });
      });
      // default home
      document.querySelector('[data-panel="home"]')?.classList.add('active');
    }

    // ----- start -----
    function init() {
      loadGame();
      updateHUD();
      renderCustomers();
      initPanels();
      // initial customer
      setTimeout(() => { if (G.queue.length === 0) spawnCustomer(); }, 500);
      // auto save
      setInterval(saveGame, 5000);
      // start loop
      requestAnimationFrame(gameLoop);
    }

    // handle visibility change (offline earnings)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        saveGame();
      } else {
        loadGame();
        updateHUD();
        renderCustomers();
      }
    });

    init();
  })();
</script>
</body>
</html>
